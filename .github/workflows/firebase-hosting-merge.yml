# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
    # Only deploy when something deployable changes. Commits that touch
    # only docs/workflows won't re-publish identical content (which Firebase
    # rejects with a 400 "current active version" error).
    paths:
      - 'public/**'
      - 'firebase.json'
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SIT_SCTP_DBA_GIT_EXERCISE }}
          channelId: live
          projectId: sit-sctp-dba-git-exercise
